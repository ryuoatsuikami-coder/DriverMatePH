name: Build DriverMate PH APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository manually
        run: |
          git clone https://github.com/${{ github.repository }}.git project
          cd project

      - name: Set up JDK and Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk gradle
          java -version
          gradle -v

      - name: Build debug APK
        run: |
          cd project
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DriverMatePH-debug-apk
          path: project/app/build/outputs/apk/debug/*.apk
