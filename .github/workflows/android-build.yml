name: Build DriverMate PH APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository manually
        run: |
          git clone https://github.com/${{ github.repository }}.git project

      - name: Set up JDK
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk unzip wget
          java -version

      - name: Install Gradle 8.7
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip gradle-8.7-bin.zip
          ./gradle-8.7/bin/gradle -v

      - name: Build debug APK
        run: |
          cd project
          ../gradle-8.7/bin/gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DriverMatePH-debug-apk
          path: project/app/build/outputs/apk/debug/*.apk
